<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>正在跳转 - 人间浊物 琅上清书</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="site-main"><div class="content-wrapper"><div class="empty-state"><p class="empty-state-text">正在跳转到文章新地址...</p><p><a href="/articles.html">返回文章列表</a></p></div></div></main>
  <script>
    (async function() {
      const articleId = new URLSearchParams(location.search).get('id');
      const response = await fetch('/data/articles.json');
      const data = await response.json();
      const article = (data.articles || []).find(item => item.id === articleId);
      if (article) location.replace(article.path);
    })();
  </script>
</body>
</html>
